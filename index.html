<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aktien-Planspiel</title>
    <meta
      name="description"
      content="Einfache Abstimmungsseite fuer ein Aktien-Planspiel mit 10.000 Euro Budget."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="topbar-label">Aktien-Planspiel</p>
          <h1>10.000 Euro verteilen</h1>
        </div>
        <div class="budget-box">
          <div class="budget-line">
            <span>Budget</span>
            <strong id="start-budget">10.000,00 €</strong>
          </div>
          <div class="budget-line">
            <span>Uebrig</span>
            <strong id="remaining-budget">10.000,00 €</strong>
          </div>
          <div class="budget-line muted">
            <span>Investiert</span>
            <strong id="invested-total">0,00 €</strong>
          </div>
          <div class="budget-bar">
            <div id="budget-progress" class="budget-progress"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="intro card">
        <p class="version-badge">v7</p>
        <p>Tippe auf die Stueckzahl, um das Numpad als kleines Popup zu oeffnen.</p>
      </section>

      <section class="variant card">
        <div class="variant-header">
          <div>
            <p class="variant-label">Auswahl</p>
            <h2>Aktienliste</h2>
          </div>
        </div>
        <div id="stocks-slider" class="stocks-list" aria-live="polite"></div>
      </section>

      <section class="actions card">
        <p class="variant-label">Auswertung</p>
        <div class="action-buttons">
          <button id="evaluate-2022-button" type="button">Depotvergleich 2022</button>
          <button id="evaluate-2025-button" type="button" class="secondary-button">
            Depotvergleich 2025
          </button>
        </div>
      </section>
    </main>

    <div id="editor-popup" class="editor-popup hidden">
      <div id="popup-backdrop" class="editor-popup-backdrop"></div>
      <section class="editor-popup-panel" role="dialog" aria-modal="true" aria-labelledby="popup-stock-name">
        <div class="editor-popup-header">
          <div>
            <p class="variant-label">Stueckzahl</p>
            <h2 id="popup-stock-name">Aktie</h2>
            <p id="popup-stock-meta" class="editor-popup-meta"></p>
          </div>
        </div>

        <div class="editor-popup-summary">
          <div class="editor-popup-box">
            <span>Stueckzahl</span>
            <strong id="popup-share-value">0</strong>
          </div>
          <div class="editor-popup-box">
            <span>Investiert</span>
            <strong id="popup-invested-value">0,00 €</strong>
          </div>
          <div class="editor-popup-box">
            <span>Maximal</span>
            <strong id="popup-max-value">0</strong>
          </div>
        </div>

        <div id="popup-pad" class="editor-popup-pad">
          <button type="button" data-numpad-key="1">1</button>
          <button type="button" data-numpad-key="2">2</button>
          <button type="button" data-numpad-key="3">3</button>
          <button type="button" data-numpad-key="4">4</button>
          <button type="button" data-numpad-key="5">5</button>
          <button type="button" data-numpad-key="6">6</button>
          <button type="button" data-numpad-key="7">7</button>
          <button type="button" data-numpad-key="8">8</button>
          <button type="button" data-numpad-key="9">9</button>
          <button type="button" data-numpad-key="clear" class="secondary-button">C</button>
          <button type="button" data-numpad-key="0">0</button>
          <button type="button" data-numpad-key="backspace" class="secondary-button">←</button>
        </div>

        <div class="editor-popup-actions">
          <button id="popup-cancel-button" type="button" class="secondary-button">Abbrechen</button>
          <button id="popup-save-button" type="button">Speichern</button>
        </div>
      </section>
    </div>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
