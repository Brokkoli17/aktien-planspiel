<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dax-Planspiel Dashboard</title>
    <meta
      name="description"
      content="Dashboard fuer automatisch uebertragene Gewinne und Verluste."
    />
    <link rel="stylesheet" href="styles.css?v=20260702b" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="topbar-label">Moderator</p>
          <h1>Live-Ergebnisse</h1>
        </div>
        <div class="budget-box result-budget-box">
          <div class="budget-line">
            <span>Ansicht</span>
            <strong id="dashboard-year">2022</strong>
          </div>
          <div class="budget-line">
            <span>Teilnehmer</span>
            <strong id="dashboard-count">0</strong>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="actions card">
        <p class="variant-label">Steuerung</p>
        <div class="action-buttons">
          <button id="dashboard-2022-button" type="button" class="secondary-button">2022</button>
          <button id="dashboard-2026-button" type="button" class="secondary-button">2026</button>
          <button id="dashboard-reset-button" type="button" class="danger-button">Alle Ergebnisse loeschen</button>
        </div>
        <p id="dashboard-status" class="sync-status"></p>
      </section>

      <section class="results card">
        <div class="results-header">
          <div>
            <p class="variant-label">Teilnehmer</p>
            <h2>Gewinn / Verlust</h2>
          </div>
        </div>
        <div id="chart-empty" class="results-empty hidden">
          Noch keine Ergebnisse eingegangen.
        </div>
        <div id="chart-area" class="chart-area"></div>
      </section>

      <section class="results card">
        <div class="results-header">
          <div>
            <p class="variant-label">Aktienwerte</p>
            <h2 id="stock-chart-title">Gewinn / Verlust der Aktien 2022</h2>
          </div>
        </div>
        <div id="stock-chart-area" class="chart-area"></div>
      </section>
    </main>

    <script src="config.js?v=20260702b"></script>
    <script src="data.js?v=20260702b"></script>
    <script src="dashboard.js?v=20260702b"></script>
  </body>
</html>
