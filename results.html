<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depot 2022</title>
    <meta
      name="description"
      content="Persoenliche Depot-Auswertung fuer das Dax-Planspiel."
    />
    <link rel="stylesheet" href="styles.css?v=20260702b" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="topbar-label">Dax-Planspiel</p>
          <h1>Depot 2022</h1>
        </div>
        <div class="budget-box result-budget-box">
          <div class="budget-line">
            <span>Jahr</span>
            <strong id="result-year">2022</strong>
          </div>
          <div class="budget-line">
            <span>Depotwert</span>
            <strong id="result-depot-value">10.000,00 €</strong>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="results card">
        <div class="results-header">
          <div>
            <p class="variant-label">Auswertung</p>
            <h2 id="result-headline">Gewinn / Verlust</h2>
          </div>
        </div>

        <div id="results-empty" class="results-empty hidden">
          Noch keine Auswahl vorhanden. Bitte zuerst Aktien auswaehlen.
        </div>

        <div id="results-content" class="results-content">
          <div class="single-chart-panel">
            <div id="summary-bars" class="summary-bars"></div>
            <div class="single-chart-footer">
              <strong id="chart-value-label">0,00 €</strong>
              <span id="chart-return-label">0,00 %</span>
            </div>
          </div>

          <section class="card result-breakdown-card">
            <div class="results-header">
              <div>
                <p class="variant-label">Gekaufte Aktien</p>
                <h2>Gewinn / Verlust je Aktie</h2>
              </div>
            </div>
            <div id="portfolio-breakdown" class="portfolio-breakdown"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="config.js?v=20260702b"></script>
    <script src="data.js?v=20260702b"></script>
    <script src="results.js?v=20260702b"></script>
  </body>
</html>
